<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANG.DEV</title>
    <link rel="icon" href="./assert/image/avata.png" type="image/png">
    <link rel="stylesheet" href="./assert/css/style.css">
</head>
<body>
    <div class="dd">
        <img class="avata" src="./assert/image/avata.png" alt="">
        <h1 id="name">QUANG DEV</h1>

        <div id="link">
            <a href="#"><img src="./assert/image/facebook.jpg" alt="Facebook"></a>
            <a href="https://discord.gg/9eMexJtBTc"><img src="./assert/image/discord.png" alt="Discord"></a>
            <a href="#"><img src="./assert/image/youtobe.png" alt="YOUTOBE"></a>
            <a href="#"><img src="./assert/image/project.gif" alt="PROJECT"></a>

        </div>
        
    </div>


    <script src="./assert/js/script.js"></script>


      <audio id="audio" src="./assert/audio/audio.mp3" autoplay muted loop></audio>
           <script>
            // Lắng nghe sự kiện load của trang để phát nhạc (tắt mute)
            window.addEventListener('load', function() {
              var audio = document.getElementById('audio');
              // Cố gắng phát nhạc khi trang tải xong
              audio.play().catch(function(error) {
                // Nếu gặp lỗi (ví dụ: trình duyệt chặn âm thanh), chờ người dùng click
                console.log("Không thể phát âm thanh tự động, chờ người dùng click.");
              });
            });
        
            // Lắng nghe sự kiện click vào bất kỳ đâu trên trang
            window.addEventListener('click', function() {
              var audio = document.getElementById('audio');
              audio.muted = false;  // Tắt chế độ mute nếu chưa bật
              audio.play();         // Phát nhạc khi người dùng click
            });
          </script>
</body>
</html>
